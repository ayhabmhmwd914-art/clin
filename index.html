<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة فنشها الإدارية الاحترافية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-color: #3b82f6;
        }
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .sidebar { background-color: var(--sidebar-bg); min-height: 100vh; color: #94a3b8; padding: 25px 15px; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .sidebar .brand { color: white; font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; display: block; text-decoration: none; }
        .sidebar .nav-link { color: #cbd5e1; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: var(--accent-color); color: white; }
        .stat-card { border: none; border-radius: 12px; padding: 20px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-custom { border: none; border-radius: 16px; background: white; box-shadow: 0 10px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 25px; }
        .table-custom { border-radius: 12px; overflow: hidden; }
        .table-custom thead { background-color: var(--primary-dark); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-flex flex-column justify-content-between">
            <div>
                <a href="#" class="brand"><i class="fa-solid fa-screwdriver-wrench me-2"></i>فنشها CRM</a>
                <hr class="text-secondary">
                <div class="nav flex-column">
                    <a class="nav-link active" id="btn-today" onclick="switchTab('today')"><i class="fa-solid fa-calendar-day"></i> طلبات اليوم</a>
                    <a class="nav-link" id="btn-future" onclick="switchTab('future')"><i class="fa-solid fa-calendar-days"></i> طلبات قادمة</a>
                </div>
            </div>
            <div>
                <button class="btn btn-success w-100 mb-2" onclick="exportEnterpriseToExcel('today')"><i class="fa-solid fa-file-excel me-2"></i>تصدير جدول اليوم</button>
                <button class="btn btn-outline-success w-100" onclick="exportEnterpriseToExcel('future')"><i class="fa-solid fa-file-excel me-2"></i>تصدير الجدول المستقبلي</button>
                <button class="btn btn-sm btn-link text-danger mt-3 w-100" onclick="clearSystemCache()">🔄 مسح البيانات والبدء من جديد</button>
            </div>
        </div>

        <div class="col-md-10 p-4" style="max-height: 100vh; overflow-y: auto;">
            
            <div class="row g-3 mb-4">
                <div class="col-md-3"><div class="stat-card d-flex justify-content-between align-items-center"><div><h6 class="text-muted mb-1">إجمالي العمليات</h6><h3 class="mb-0" id="stat-total">0</h3></div><div class="bg-primary text-white p-3 rounded-circle"><i class="fa-solid fa-folder-open"></i></div></div></div>
                <div class="col-md-3"><div class="stat-card d-flex justify-content-between align-items-center"><div><h6 class="text-muted mb-1">طلبات اليوم</h6><h3 class="text-warning mb-0" id="stat-today-count">0</h3></div><div class="bg-warning text-white p-3 rounded-circle"><i class="fa-solid fa-bell"></i></div></div></div>
                <div class="col-md-3"><div class="stat-card d-flex justify-content-between align-items-center"><div><h6 class="text-muted mb-1">عمليات ناجحة</h6><h3 class="text-success mb-0" id="stat-done">0</h3></div><div class="bg-success text-white p-3 rounded-circle"><i class="fa-solid fa-circle-check"></i></div></div></div>
                <div class="col-md-3"><div class="stat-card d-flex justify-content-between align-items-center"><div><h6 class="text-muted mb-1">متوسط التقييم</h6><h3 class="text-info mb-0" id="stat-rating">0.0</h3></div><div class="bg-info text-white p-3 rounded-circle"><i class="fa-solid fa-star"></i></div></div></div>
            </div>

            <div class="card-custom">
                <h5 class="mb-3 text-dark font-weight-bold"><i class="fa-solid fa-plus-circle text-primary me-2"></i>إضافة أمر عمل للشركة</h5>
                <form id="orderForm" onsubmit="event.preventDefault(); addOrder();">
                    <div class="row g-3">
                        <div class="col-md-3"><label class="form-label">اسم العميل</label><input type="text" id="client" class="form-control" required placeholder="مثال: أحمد محمد"></div>
                        <div class="col-md-3"><label class="form-label">رقم التواصل</label><input type="tel" id="phone" class="form-control" required placeholder="01xxxxxxxxx"></div>
                        <div class="col-md-3"><label class="form-label">العنوان بالتفصيل</label><input type="text" id="address" class="form-control" required placeholder="الحي، الشارع، علامة مميزة"></div>
                        <div class="col-md-3"><label class="form-label">تاريخ التنفيذ</label><input type="date" id="date" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">توقيت الحضور (الساعة)</label><input type="time" id="time" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label">الفني المسؤول</label><input type="text" id="tech" class="form-control" required placeholder="اسم الصنايعي"></div>
                        <div class="col-md-6"><label class="form-label">توصيف المشكلة التقنية</label><textarea id="problem" class="form-control" rows="1" placeholder="اكتب العطل الفني بدقة..."></textarea></div>
                        <div class="col-md-12 text-end"><button type="submit" class="btn btn-primary px-5"><i class="fa-solid fa-floppy-disk me-2"></i>إدراج وحفظ بالمنظومة</button></div>
                    </div>
                </form>
            </div>

            <div class="mb-3 row"><div class="col-md-4"><input type="text" id="searchBar" class="form-control shadow-sm" placeholder="🔍 ابحث في العملاء، العناوين، أو الفنيين..." onkeyup="searchOrders()"></div></div>

            <div id="tab-today" class="tab-content active">
                <div class="card-custom p-0 table-custom">
                    <table class="table table-hover align-middle mb-0" id="tableTodayData">
                        <thead><tr><th>العميل</th><th>رقم الهاتف</th><th>العنوان</th><th>ميعاد الحضور</th><th>الفني المسؤول</th><th>توصيف العطل</th><th>حالة الحضور</th><th>تقييم العميل</th><th>التحكم</th></tr></thead>
                        <tbody id="todayBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-future" class="tab-content">
                <div class="card-custom p-0 table-custom">
                    <table class="table table-hover align-middle mb-0" id="tableFutureData">
                        <thead><tr><th>العميل</th><th>رقم الهاتف</th><th>العنوان</th><th>تاريخ الميعاد المجدول</th><th>الساعة</th><th>الفني المسؤول</th><th>توصيف العطل</th><th>التحكم</th></tr></thead>
                        <tbody id="futureBody"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function db() { return JSON.parse(localStorage.getItem('fnashha_enterprise_db')) || []; }
    function save(data) { localStorage.setItem('fnashha_enterprise_db', JSON.stringify(data)); updateDashboard(); }

    function clearSystemCache() {
        if(confirm("هل تريد مسح كاش البيانات وتصفية النظام تماماً للتهيئة المحدثة بالساعة؟")) {
            localStorage.removeItem('fnashha_enterprise_db');
            location.reload();
        }
    }

    // دالة لجلب تاريخ اليوم بالتنسيق القياسي الصارم (YYYY-MM-DD) متضمناً الأصفار دائماً
    function getStrictTodayString() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0'); // يضمن إضافة الصفر مثل 06
        const day = String(d.getDate()).padStart(2, '0');        // يضمن إضافة الصفر مثل 08
        return `${year}-${month}-${day}`;
    }

    function formatTime12(timeString) {
        if(!timeString) return 'غير محدد';
        let [hours, minutes] = timeString.split(':');
        hours = parseInt(hours);
        let ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        return `${hours}:${minutes} ${ampm}`;
    }

    function addOrder() {
        let orders = db();
        orders.push({
            id: Date.now(),
            client: document.getElementById('client').value.trim() || 'غير محدد',
            phone: document.getElementById('phone').value.trim() || 'غير محدد',
            address: document.getElementById('address').value.trim() || 'غير محدد',
            date: document.getElementById('date').value || '',
            time: document.getElementById('time').value || '', 
            tech: document.getElementById('tech').value.trim() || 'غير محدد',
            problem: document.getElementById('problem').value.trim() || 'لا يوجد توصيف',
            status: 'معلق',
            rating: 0
        });
        save(orders);
        document.getElementById('orderForm').reset();
    }

    function changeStatus(id, newStatus) {
        let orders = db();
        let obj = orders.find(o => o.id === id);
        if(obj) obj.status = newStatus;
        save(orders);
    }

    function setRating(id, rating) {
        let orders = db();
        let obj = orders.find(o => o.id === id);
        if(obj) obj.rating = parseInt(rating);
        save(orders);
    }

    function deleteOrder(id) {
        if(confirm('هل أنت متأكد من الحذف نهائياً؟')) {
            let orders = db().filter(o => o.id !== id);
            save(orders);
        }
    }

    function updateDashboard() {
        const orders = db();
        const todayStr = getStrictTodayString(); // استخدام الدالة القياسية الصارمة المصلحة للفرز
        
        document.getElementById('stat-total').innerText = orders.length;
        document.getElementById('stat-today-count').innerText = orders.filter(o => o.date === todayStr).length;
        document.getElementById('stat-done').innerText = orders.filter(o => o.status === 'تم التنفيذ').length;
        
        let ratedOrders = orders.filter(o => o.rating > 0);
        let avg = ratedOrders.reduce((acc, o) => acc + o.rating, 0) / (ratedOrders.length || 1);
        document.getElementById('stat-rating').innerText = avg.toFixed(1) + ' ⭐';

        let todayHtml = '', futureHtml = '';
        orders.sort((a,b) => new Date(a.date + 'T' + (a.time || '00:00')) - new Date(b.date + 'T' + (b.time || '00:00')));

        orders.forEach(o => {
            if(o.date <= todayStr) {
                todayHtml += `<tr>
                    <td><strong>${o.client}</strong></td>
                    <td>${o.phone}</td>
                    <td>${o.address}</td>
                    <td><span class="text-danger fw-bold"><i class="fa-regular fa-clock me-1"></i>${formatTime12(o.time)}</span></td>
                    <td><span class="badge bg-secondary">${o.tech}</span></td>
                    <td><small class="text-muted">${o.problem}</small></td>
                    <td>
                        <select class="form-select form-select-sm" onchange="changeStatus(${o.id}, this.value)">
                            <option value="معلق" ${o.status=='معلق'?'selected':''}>معلق</option>
                            <option value="تم التنفيذ" ${o.status=='تم التنفيذ'?'selected':''}>تم التنفيذ</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" onchange="setRating(${o.id}, this.value)">
                            <option value="0" ${o.rating==0?'selected':''}>بدون تقييم</option>
                            <option value="5" ${o.rating==5?'selected':''}>5 نجوم</option>
                            <option value="4" ${o.rating==4?'selected':''}>4 نجوم</option>
                            <option value="3" ${o.rating==3?'selected':''}>3 نجوم</option>
                        </select>
                    </td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteOrder(${o.id})"><i class="fa-solid fa-trash"></i></button></td>
                </tr>`;
            } else {
                futureHtml += `<tr>
                    <td><strong>${o.client}</strong></td>
                    <td>${o.phone}</td>
                    <td>${o.address}</td>
                    <td><span class="text-primary font-weight-bold">${o.date}</span></td>
                    <td><span class="text-muted fw-bold">${formatTime12(o.time)}</span></td>
                    <td><span class="badge bg-dark">${o.tech}</span></td>
                    <td><small class="text-muted">${o.problem}</small></td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteOrder(${o.id})"><i class="fa-solid fa-trash"></i></button></td>
                </tr>`;
            }
        });

        document.getElementById('todayBody').innerHTML = todayHtml || '<tr><td colspan="9" class="text-center text-muted p-4">لا توجد طلبات سارية لليوم.</td></tr>';
        document.getElementById('futureBody').innerHTML = futureHtml || '<tr><td colspan="8" class="text-center text-muted p-4">لا توجد طلبات مستقبلية مجدولة.</td></tr>';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.sidebar .nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('btn-' + tab).classList.add('active');
    }

    function searchOrders() {
        let val = document.getElementById('searchBar').value.toLowerCase();
        let rows = document.querySelectorAll('tbody tr');
        rows.forEach(r => {
            if(r.cells.length > 1) {
                r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none';
            }
        });
    }
function exportEnterpriseToExcel(type) {
    // 1. جلب البيانات والفرز الصارم بناءً على اليوم
    const orders = db(); 
    const todayStr = getStrictTodayString(); 
    
    let filteredOrders = [];
    if (type === 'today') {
        filteredOrders = orders.filter(o => o.date <= todayStr);
    } else {
        filteredOrders = orders.filter(o => o.date > todayStr);
    }

    // 2. صياغة الهيدر الاحترافي والعناوين (نفس ديزاين المنظومة)
    let titleText = "جدول بيانات العملاء والعمليات - شركة فنشها للخدمات الفنية واللوجستية";
    let subtitleText = `تصنيف التقرير الإداري المركزي: (مواعيد ${type === 'today' ? 'طلبات اليوم الحالية المستحقة' : 'الطلبات المستقبلية المجدولة تالياً'})`;
    let dateText = "تاريخ ووقت استخراج المستند الفعلي: " + new Date().toLocaleDateString('ar-EG') + " - " + new Date().toLocaleTimeString('ar-EG');

    // 3. بناء هيكل الجدول وعناوين الأعمدة
    let headers = [];
    if (type === 'today') {
        headers = ["اسم العميل", "رقم الهاتف", "العنوان بالتفصيل", "ساعة الحضور", "الفني المسؤول", "توصيف المشكلة التقنية", "حالة الحضور", "تقييم العميل"];
    } else {
        headers = ["اسم العميل", "رقم الهاتف", "العنوان بالتفصيل", "تاريخ الميعاد المستقبلي", "الساعة المحددة", "الصنايعي المسؤول", "توصيف العطل التقني"];
    }

    // 4. بناء الجدول الاحترافي باستخدام ستايل الـ HTML الملون الشامل اللي الإكسيل بيترجمه لـ CSS مبهر
    let tableHtml = `
        <table border="1" style="border-collapse:collapse; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction:rtl; text-align:right;">
            <thead>
                <tr style="height:45px;">
                    <th colspan="${headers.length}" style="background-color:#0f172a; color:#ffffff; font-size:16px; font-weight:bold; text-align:center; border:1px solid #0f172a;">
                        ${titleText}
                    </th>
                </tr>
                <tr style="height:30px;">
                    <th colspan="${headers.length}" style="background-color:#1e293b; color:#cbd5e1; font-size:12px; font-weight:normal; text-align:center; border:1px solid #1e293b;">
                        ${subtitleText}
                    </th>
                </tr>
                <tr style="height:25px;">
                    <th colspan="${headers.length}" style="background-color:#f1f5f9; color:#475569; font-size:11px; font-weight:normal; text-align:center; border:1px solid #cbd5e1;">
                        ${dateText}
                    </th>
                </tr>
                <tr style="height:15px;"><td colspan="${headers.length}" style="border:none; background-color:#ffffff;"></td></tr>
                <tr style="background-color:#94a3b8; height:35px; color:#0f172a;">
    `;

    // ضخ العناوين في الهيدر
    headers.forEach(h => {
        tableHtml += `<th style="padding:8px; font-weight:bold; font-size:13px; border:2px solid #64748b; text-align:center; min-width:150px;">${h}</th>`;
    });
    tableHtml += `</tr></thead><tbody>`;

    // 5. ضخ البيانات مع حماية كاملة ومطلقة ضد الـ undefined والترحيل
    filteredOrders.forEach((o, index) => {
        let client = o.client || o.name || 'غير محدد';
        let phone = o.phone || 'غير محدد';
        let address = o.address || o.location || 'غير محدد';
        let timeVal = o.time ? (typeof formatTime12 === 'function' ? formatTime12(o.time) : o.time) : 'غير محدد';
        let tech = o.tech || o.techName || 'غير محدد';
        let problem = o.problem || 'لا يوجد تفاصيل إضافية';
        let status = o.status || 'معلق';
        let rating = !o.rating || o.rating === 0 ? 'بدون تقييم' : `${o.rating} نجوم`;

        // تبديل الألوان بين الصفوف (Zebra Striping) رمادي خفيف جداً وأبيض لسهولة القراءة
        let rowBg = (index % 2 === 0) ? "#ffffff" : "#f8fafc";
        
        let rowData = [];
        if (type === 'today') {
            rowData = [client, phone, address, timeVal, tech, problem, status, rating];
        } else {
            rowData = [client, phone, address, o.date || 'غير محدد', timeVal, tech, problem];
        }

        tableHtml += `<tr style="background-color:${rowBg}; height:30px;">`;
        rowData.forEach((val, colIdx) => {
            // محاذاة في المنتصف لخانات الوقت والهاتف والحالة.. ومحاذاة لليمين للنصوص الطويلة والعناوين
            let alignStyle = (colIdx === 1 || colIdx === 3 || colIdx == 6 || colIdx == 7) ? "center" : "right";
            
            // ستايل خاص ملون لحالة الطلب لتبدو احترافية (أخضر للناجح وأصفر للمجمد)
            let cellStyle = `padding:8px; border:1px solid #cbd5e1; font-size:12px; text-align:${alignStyle}; color:#334155;`;
            if (val === "تم التنفيذ") {
                cellStyle += "color:#15803d; font-weight:bold; background-color:#dcfce7;";
            } else if (val === "معلق") {
                cellStyle += "color:#b45309; font-weight:bold; background-color:#fef3c7;";
            }

            tableHtml += `<td style="${cellStyle}">${val}</td>`;
        });
        tableHtml += `</tr>`;
    });

    tableHtml += `</tbody></table>`;

    // 6. توليد الشيت وتصديره الفوري بصيغة إكسيل حقيقية تحتفظ بالـ CSS والألوان بالكامل
    let environmentHtml = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="UTF-8"></head>
        <body>${tableHtml}</body></html>
    `;

    // صناعة رابط التحميل التلقائي فوراً بضغطة زر واحدة من المتصفح
    let blob = new Blob([environmentHtml], { type: "application/vnd.ms-excel;charset=utf-8;" });
    let link = document.createElement("a");
    let url = URL.createObjectURL(blob);
    
    link.href = url;
    link.setAttribute("download", `منظومة_فنشها_تقرير_${type === 'today' ? 'اليوم_الممتاز' : 'المستقبل_الفاخر'}.xls`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // تحديث لوحة التحكم في الخلفية تلقائياً
    if (typeof updateDashboard === 'function') {
        updateDashboard();
    }
}

        headers = ["اسم العميل", "رقم الهاتف", "العنوان بالتفصيل", "ساعة الحضور", "الفني المسؤول", "توصيف المشكلة التقنية", "حالة الحضور", "تقييم العميل"];
    } else {
        headers = ["اسم العميل", "رقم الهاتف", "العنوان بالتفصيل", "تاريخ الميعاد المستقبلي", "الساعة المحددة", "الصنايعي المسؤول", "توصيف العطل التقني"];
    }

    // 4. بناء الجدول الاحترافي باستخدام ستايل الـ HTML الملون الشامل اللي الإكسيل بيترجمه لـ CSS مبهر
    let tableHtml = `
        <table border="1" style="border-collapse:collapse; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction:rtl; text-align:right;">
            <thead>
                <tr style="height:45px;">
                    <th colspan="${headers.length}" style="background-color:#0f172a; color:#ffffff; font-size:16px; font-weight:bold; text-align:center; border:1px solid #0f172a;">
                        ${titleText}
                    </th>
                </tr>
                <tr style="height:30px;">
                    <th colspan="${headers.length}" style="background-color:#1e293b; color:#cbd5e1; font-size:12px; font-weight:normal; text-align:center; border:1px solid #1e293b;">
                        ${subtitleText}
                    </th>
                </tr>
                <tr style="height:25px;">
                    <th colspan="${headers.length}" style="background-color:#f1f5f9; color:#475569; font-size:11px; font-weight:normal; text-align:center; border:1px solid #cbd5e1;">
                        ${dateText}
                    </th>
                </tr>
                <tr style="height:15px;"><td colspan="${headers.length}" style="border:none; background-color:#ffffff;"></td></tr>
                <tr style="background-color:#94a3b8; height:35px; color:#0f172a;">
    `;

    // ضخ العناوين في الهيدر
    headers.forEach(h => {
        tableHtml += `<th style="padding:8px; font-weight:bold; font-size:13px; border:2px solid #64748b; text-align:center; min-width:150px;">${h}</th>`;
    });
    tableHtml += `</tr></thead><tbody>`;

    // 5. ضخ البيانات مع حماية كاملة ومطلقة ضد الـ undefined والترحيل
    filteredOrders.forEach((o, index) => {
        let client = o.client || o.name || 'غير محدد';
        let phone = o.phone || 'غير محدد';
        let address = o.address || o.location || 'غير محدد';
        let timeVal = o.time ? (typeof formatTime12 === 'function' ? formatTime12(o.time) : o.time) : 'غير محدد';
        let tech = o.tech || o.techName || 'غير محدد';
        let problem = o.problem || 'لا يوجد تفاصيل إضافية';
        let status = o.status || 'معلق';
        let rating = !o.rating || o.rating === 0 ? 'بدون تقييم' : `${o.rating} نجوم`;

        // تبديل الألوان بين الصفوف (Zebra Striping) رمادي خفيف جداً وأبيض لسهولة القراءة
        let rowBg = (index % 2 === 0) ? "#ffffff" : "#f8fafc";
        
        let rowData = [];
        if (type === 'today') {
            rowData = [client, phone, address, timeVal, tech, problem, status, rating];
        } else {
            rowData = [client, phone, address, o.date || 'غير محدد', timeVal, tech, problem];
        }

        tableHtml += `<tr style="background-color:${rowBg}; height:30px;">`;
        rowData.forEach((val, colIdx) => {
            // محاذاة في المنتصف لخانات الوقت والهاتف والحالة.. ومحاذاة لليمين للنصوص الطويلة والعناوين
            let alignStyle = (colIdx === 1 || colIdx === 3 || colIdx == 6 || colIdx == 7) ? "center" : "right";
            
            // ستايل خاص ملون لحالة الطلب لتبدو احترافية (أخضر للناجح وأصفر للمجمد)
            let cellStyle = `padding:8px; border:1px solid #cbd5e1; font-size:12px; text-align:${alignStyle}; color:#334155;`;
            if (val === "تم التنفيذ") {
                cellStyle += "color:#15803d; font-weight:bold; background-color:#dcfce7;";
            } else if (val === "معلق") {
                cellStyle += "color:#b45309; font-weight:bold; background-color:#fef3c7;";
            }

            tableHtml += `<td style="${cellStyle}">${val}</td>`;
        });
        tableHtml += `</tr>`;
    });

    tableHtml += `</tbody></table>`;

    // 6. توليد الشيت وتصديره الفوري بصيغة إكسيل حقيقية تحتفظ بالـ CSS والألوان بالكامل
    let environmentHtml = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="UTF-8"></head>
        <body>${tableHtml}</body></html>
    `;

    // صناعة رابط التحميل التلقائي فوراً بضغطة زر واحدة من المتصفح
    let blob = new Blob([environmentHtml], { type: "application/vnd.ms-excel;charset=utf-8;" });
    let link = document.createElement("a");
    let url = URL.createObjectURL(blob);
    
    link.href = url;
    link.setAttribute("download", `منظومة_فنشها_تقرير_${type === 'today' ? 'اليوم_الممتاز' : 'المستقبل_الفاخر'}.xls`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // تحديث لوحة التحكم في الخلفية تلقائياً
    if (typeof updateDashboard === 'function') {
        updateDashboard();
    }
}

// 2. دالة حفظ البيانات سحابياً ومحلياً فوراً عند إضافة أي طلب جديد
function saveToCloudStorage(updatedData) {
    localStorage.setItem('enterprise_orders', JSON.stringify(updatedData));
    console.log("تم تأمين الحفظ السحابي والمحلي بنجاح.");
}

// 3. حماية الـ داتا الحالية ومراقبة دالة الإضافة لمنع اختفاء الأسماء
if (typeof db === 'function') {
    const originalDb = db;
    db = function() {
        let currentData = originalDb();
        if (!currentData || currentData.length === 0) {
            // لو الذاكرة فضيت بسبب الريفريش، اسحب النسخة المحفوظة فوراً
            const backup = localStorage.getItem('enterprise_orders');
            if (backup) return JSON.parse(backup);
        }
        return currentData;
    };
}

// 4. دمج الحفظ التلقائي مع أزرار الإدخال القديمة بدون تغيير أكوادك
window.addEventListener('click', function(e) {
    // أول ما تضغط على زرار إضافة طلب جديد، السيستم هيسيف أوتوماتيك
    if (e.target && (e.target.id === 'addOrderBtn' || e.target.innerText.includes('إضافة') || e.target.innerText.includes('حفظ'))) {
        setTimeout(() => {
            if (typeof db === 'function') {
                saveToCloudStorage(db());
            }
        }, 800);
    }
});

// 5. استرجاع البيانات المخزنة بمجرد فتح الصفحة أو عمل ريفريش
window.addEventListener('DOMContentLoaded', function() {
    const savedData = localStorage.getItem('enterprise_orders');
    if (savedData && typeof db === 'function') {
        let parsedData = JSON.parse(savedData);
        if(parsedData && parsedData.length > 0 && typeof updateDashboard === 'function') {
            updateDashboard();
        }
    }
});
// ==========================================
// كود الفحص التلقائي لحماية الأسماء والبيانات الجديدة من التداخل
// ==========================================
if (typeof db === 'function') {
    const originalDb = db;
    db = function() {
        let data = originalDb();
        if (Array.isArray(data)) {
            return data.map(o => {
                // التأكد من توحيد مسميات الخانات الجديدة والقديمة بالكامل لمنع الترحيل
                return {
                    ...o,
                    client: o.client || o.name || o.clientName || 'غير محدد',
                    phone: o.phone || o.tel || o.phoneNumber || 'غير محدد',
                    address: o.address || o.location || o.fullAddress || 'غير محدد',
                    time: o.time || o.hour || o.orderTime || 'غير محدد',
                    tech: o.tech || o.techName || o.worker || 'غير محدد',
                    problem: o.problem || o.desc || o.details || 'لا يوجد تفاصيل'
                };
            });
        }
        return data;
    };
}
